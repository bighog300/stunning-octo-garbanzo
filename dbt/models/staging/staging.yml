version: 2

models:
  - name: stg_artworks
    columns:
      - name: raw_artwork_id
        tests:
          - not_null
          - unique
      - name: source_url
        tests:
          - not_null
      - name: source_domain
        tests:
          - not_null

  - name: stg_events
    columns:
      - name: raw_event_id
        tests:
          - not_null
          - unique
      - name: source_url
        tests:
          - not_null
      - name: source_domain
        tests:
          - not_null

  - name: stg_event_artists
    columns:
      - name: raw_event_artist_id
        tests:
          - not_null
          - unique
      - name: event_id
        tests:
          - not_null

  - name: stg_galleries
    columns:
      - name: raw_gallery_id
        tests:
          - not_null
          - unique
      - name: source_url
        tests:
          - not_null
      - name: source_domain
        tests:
          - not_null


  - name: stg_event_artist_candidates
    columns:
      - name: event_id
        tests:
          - not_null
      - name: normalized_candidate_artist_name
        tests:
          - not_null
