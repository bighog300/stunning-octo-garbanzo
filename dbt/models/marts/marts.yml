version: 2

models:
  - name: mart_artworks
    columns:
      - name: artwork_id
        tests:
          - not_null
          - unique
      - name: source_domain
        tests:
          - not_null
      - name: quality_score
        tests:
          - not_null

  - name: mart_crawl_quality

  - name: mart_events
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: source_url
        tests:
          - not_null

  - name: mart_artist_activity
    columns:
      - name: artist_activity_id
        tests:
          - not_null
          - unique
      - name: event_id
        tests:
          - not_null

  - name: mart_galleries
    columns:
      - name: gallery_id
        tests:
          - not_null
      - name: source_domain
        tests:
          - not_null
