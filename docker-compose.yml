version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-artio-dev-secret}
    ARTIO_POSTGRES_HOST: postgres
    ARTIO_POSTGRES_PORT: 5432
    ARTIO_POSTGRES_DB: artio
    ARTIO_POSTGRES_USER: artio
    ARTIO_POSTGRES_PASSWORD: artio
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./crawlers:/opt/artio/crawlers
    - ./dbt:/opt/artio/dbt
    - ./infra:/opt/artio/infra
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - artio_net

services:
  postgres:
    image: postgres:16
    container_name: artio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - artio_net

  airflow-init:
    <<: *airflow-common
    container_name: artio_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Artio \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password admin || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: artio_airflow_webserver
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    container_name: artio_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  scrapy:
    build:
      context: ./crawlers
      dockerfile: Dockerfile
    container_name: artio_scrapy
    restart: "no"
    environment:
      ARTIO_POSTGRES_HOST: postgres
      ARTIO_POSTGRES_PORT: 5432
      ARTIO_POSTGRES_DB: artio
      ARTIO_POSTGRES_USER: artio
      ARTIO_POSTGRES_PASSWORD: artio
      PYTHONPATH: /opt/artio
    volumes:
      - ./crawlers:/opt/artio/crawlers
      - ./scraper:/opt/artio/scraper
      - ./reports/tmp:/opt/artio/reports/tmp
    working_dir: /opt/artio/crawlers
    command: tail -f /dev/null
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - artio_net

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: artio_dbt
    restart: "no"
    environment:
      ARTIO_POSTGRES_HOST: postgres
      ARTIO_POSTGRES_PORT: 5432
      ARTIO_POSTGRES_DB: artio
      ARTIO_POSTGRES_USER: artio
      ARTIO_POSTGRES_PASSWORD: artio
    volumes:
      - ./dbt:/opt/artio/dbt
    working_dir: /opt/artio/dbt
    command: tail -f /dev/null
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - artio_net

  superset:
    image: apache/superset:4.0.2
    container_name: artio_superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-artio-superset-dev-secret}
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        superset db upgrade
        superset fab create-admin \
          --username admin \
          --firstname Artio \
          --lastname Admin \
          --email admin@example.com \
          --password admin || true
        superset init
        superset run -h 0.0.0.0 -p 8088
    networks:
      - artio_net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: artio_api
    restart: unless-stopped
    environment:
      ARTIO_POSTGRES_HOST: postgres
      ARTIO_POSTGRES_PORT: 5432
      ARTIO_POSTGRES_DB: artio
      ARTIO_POSTGRES_USER: artio
      ARTIO_POSTGRES_PASSWORD: artio
      PYTHONPATH: /opt/artio
    volumes:
      - ./scraper:/opt/artio/scraper
      - ./reports/tmp:/opt/artio/reports/tmp
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - artio_net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: artio_web
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
    networks:
      - artio_net

volumes:
  postgres_data:
  superset_home:

networks:
  artio_net:
    driver: bridge
